    <style>
        :root {
            --sky-blue: #a0d8ef;

            --mario-red: #e4000f;
            --mario-blue: #0058e0;
        }
        body {
            background: linear-gradient(to bottom, var(--sky-blue) 0%, #e0f2f1 70%, var(--grass-green) 100%);
            color: #333; font-family: "Microsoft JhengHei", sans-serif;
            margin: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh;
        }
        .container {
            text-align: center; width: 95%; max-width: 900px; background: rgba(255, 255, 255, 0.95);
            padding: 30px; border-radius: 40px; box-shadow: 0 15px 35px rgba(0,0,0,0.15); border: 8px solid white;
        }
        h1 { font-size: 3rem; color: var(--mario-blue); text-shadow: 2px 2px 0px white; margin: 0 0 20px 0; }
        .settings-bar {
            display: flex; justify-content: center; flex-wrap: wrap; gap: 15px; margin-bottom: 25px;
            background: #f1f8e9; padding: 20px; border-radius: 20px; border: 2px solid #c5e1a5;
        }
        .setting-item { display: flex; flex-direction: column; align-items: flex-start; }
        .setting-item label { font-weight: bold; margin-bottom: 5px; color: #555; font-size: 0.9rem; }
        select { padding: 10px 15px; font-size: 1.1rem; border-radius: 12px; border: 2px solid #795548; background: white; cursor: pointer; }
        .display-card {
            background-color: var(--sun-yellow); border: 6px solid var(--orange-red); border-radius: 35px;
            padding: 40px 20px; min-height: 380px; display: flex; flex-direction: column; align-items: center; justify-content: center;
            box-shadow: inset 0 0 20px rgba(255, 87, 34, 0.1);
        }
        #winner-info { font-size: 1.6rem; color: #5d4037; background: white; padding: 8px 25px; border-radius: 30px; margin-bottom: 10px; box-shadow: 0 4px 0px rgba(0,0,0,0.05); }
        #winner-name { font-size: 6rem; font-weight: bold; color: var(--mario-red); text-shadow: 4px 4px 0px white; margin: 5px 0; }
        .sentence-box { width: 90%; background: white; border: 4px solid #ffb74d; border-radius: 20px; padding: 25px; margin-top: 15px; display: none; }
        .sentence-en { font-size: 2.2rem; color: var(--mario-blue); font-weight: bold; display: block; margin-bottom: 8px; line-height: 1.2; }
        .sentence-ch { font-size: 1.8rem; color: #555; display: block; }
        .btn-group { margin-top: 25px; display: flex; gap: 15px; justify-content: center; align-items: center; flex-wrap: wrap;}
        .draw-btn { padding: 15px 60px; font-size: 1.8rem; background: var(--orange-red); color: white; border: none; border-radius: 60px; cursor: pointer; font-weight: bold; box-shadow: 0 8px 0px #b71c1c; transition: all 0.1s; }
        .draw-btn:active { transform: translateY(4px); box-shadow: 0 4px 0px #b71c1c; }
        .reset-btn { padding: 10px 20px; font-size: 1rem; background: #9e9e9e; color: white; border: none; border-radius: 10px; cursor: pointer; }
        .celebrate { animation: pop 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        @keyframes pop { 0% { transform: scale(0.5); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
        #counter-info { margin-top: 15px; font-size: 1rem; color: #666; font-weight: bold; }
    </style>
</head>

let audioCtx = null;
function initAudio() { if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }
function playCoin() {
    initAudio(); const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
    osc.type = 'square'; osc.frequency.setValueAtTime(987.77, audioCtx.currentTime); 
    osc.frequency.setValueAtTime(1318.51, audioCtx.currentTime + 0.08); 
    gain.gain.setValueAtTime(0.05, audioCtx.currentTime); gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.1);
    osc.connect(gain); gain.connect(audioCtx.destination); osc.start(); osc.stop(audioCtx.currentTime + 0.1);
}
function playPowerUp() {
    initAudio(); const freqs = [130.81, 155.56, 196.00, 261.63, 311.13, 392.00, 523.25, 622.25, 783.99];
    freqs.forEach((f, i) => {
        const osc = audioCtx.createOscillator(); const g = audioCtx.createGain();
        osc.type = 'square'; osc.frequency.setValueAtTime(f, audioCtx.currentTime + i * 0.07);
        g.gain.setValueAtTime(0.08, audioCtx.currentTime + i * 0.07); g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + i * 0.07 + 0.1);
        osc.connect(g); g.connect(audioCtx.destination); osc.start(audioCtx.currentTime + i * 0.07); osc.stop(audioCtx.currentTime + i * 0.07 + 0.1);
    });
}

const students = rawRoster.split('\n').map(l => {
    const [klass, seat, name] = l.split(',');
    return { id: klass+seat+name, klass, seat, name };
});

// --- 下拉選單連動邏輯 ---
const gradeSelect = document.getElementById('gradeSelect');
const classSelect = document.getElementById('classSelect');

["一年", "二年", "三年", "四年", "五年", "六年"].forEach(g => gradeSelect.add(new Option(g + "級", g)));

function updateClassOptions() {
    const grade = gradeSelect.value;
    const classesInGrade = [...new Set(students.filter(s => s.klass.startsWith(grade)).map(s => s.klass))];
    classSelect.innerHTML = "";
    classSelect.add(new Option("全部班級", "all"));
    classesInGrade.forEach(c => classSelect.add(new Option(c, c)));
    updateCounter();
}

gradeSelect.addEventListener('change', updateClassOptions);
classSelect.addEventListener('change', updateCounter);

// --- 記憶與計數邏輯 ---
let drawnHistory = JSON.parse(localStorage.getItem('drawn_history_final_v4')) || [];

function updateCounter() {
    const grade = gradeSelect.value;
    const klass = classSelect.value;
    let currentPool = students.filter(s => s.klass.startsWith(grade));
    if (klass !== "all") currentPool = currentPool.filter(s => s.klass === klass);
    
    const total = currentPool.length;
    const drawn = drawnHistory.filter(id => {
        const s = students.find(std => std.id === id);
        return s && s.klass.startsWith(grade) && (klass === "all" || s.klass === klass);
    }).length;
    
    document.getElementById('counter-info').innerText = `目前名單共 ${total} 人，已抽 ${drawn} 人，剩餘 ${total - drawn} 人`;
}

updateClassOptions(); // 初始載入

// --- 抽籤主程式 ---
const btnDraw = document.getElementById('btnDraw');
const winnerInfo = document.getElementById('winner-info');
const winnerName = document.getElementById('winner-name');
const sentenceBox = document.getElementById('sentence-box');
const sentenceEn = document.getElementById('sentence-en');
const sentenceCh = document.getElementById('sentence-ch');

btnDraw.addEventListener('click', () => {
    const grade = gradeSelect.value;
    const klass = classSelect.value;
    const week = weekSelect.value;
    
    let pool = students.filter(s => s.klass.startsWith(grade) && !drawnHistory.includes(s.id));
    if (klass !== "all") pool = pool.filter(s => s.klass === klass);

    if (pool.length === 0) {
        if (confirm("選定名單的所有人都抽過囉！要重置紀錄開始新的一輪嗎？")) {
            // 只重置目前選擇範圍的紀錄
            drawnHistory = drawnHistory.filter(id => {
                const s = students.find(std => std.id === id);
                if (!s) return false;
                const matchGrade = s.klass.startsWith(grade);
                const matchKlass = (klass === "all" || s.klass === klass);
                return !(matchGrade && matchKlass);
            });
            localStorage.setItem('drawn_history_final_v4', JSON.stringify(drawnHistory));
            updateCounter();
            alert("已清空紀錄，請再次點擊抽籤。");
        }
        return;
    }

    btnDraw.disabled = true;
    sentenceBox.style.display = 'none';
    winnerName.classList.remove('celebrate');
    winnerInfo.innerText = "🔍 搜尋同學中...";

    let counter = 0;
    const interval = setInterval(() => {
        const rand = pool[Math.floor(Math.random() * pool.length)];
        winnerName.innerText = rand.name;
        if (counter % 3 === 0) playCoin();
        counter++;

        if (counter >= 30) {
            clearInterval(interval);
            const final = pool[Math.floor(Math.random() * pool.length)];
            winnerInfo.innerText = `${final.klass} | 座號 ${final.seat}`;
            winnerName.innerText = final.name;
            winnerName.classList.add('celebrate');

            // 儲存紀錄
            drawnHistory.push(final.id);
            localStorage.setItem('drawn_history_final_v4', JSON.stringify(drawnHistory));
            updateCounter();

            // 顯示每週一句 (3-6年級)
            if (["三年", "四年", "五年", "六年"].includes(grade)) {
                const data = sentencesData[grade][week];
                if (data && data.en !== "—") {
                    sentenceEn.innerText = data.en;
                    sentenceCh.innerText = data.ch;
                    sentenceBox.style.display = 'block';
                }
            }
            playPowerUp();
            btnDraw.disabled = false;
        }
    }, 70);
});

document.getElementById('btnReset').addEventListener('click', () => {
    const grade = gradeSelect.value;
    const klass = classSelect.value;
    const scope = klass === "all" ? `${grade}級全部班級` : klass;
    if (confirm(`確定要清除【${scope}】的所有抽籤紀錄嗎？`)) {
        drawnHistory = drawnHistory.filter(id => {
            const s = students.find(std => std.id === id);
            if (!s) return false;
            const matchGrade = s.klass.startsWith(grade);
            const matchKlass = (klass === "all" || s.klass === klass);
            return !(matchGrade && matchKlass);
        });
        localStorage.setItem('drawn_history_final_v4', JSON.stringify(drawnHistory));
        updateCounter();
        alert("紀錄已清除！");
    }
});
